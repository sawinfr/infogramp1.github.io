<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background-color: #222; font-family: 'Malgun Gothic', sans-serif; touch-action: manipulation; -webkit-text-size-adjust: 100%; }
  .slide { position:relative; width:960pt; height:540pt; background:#fff; box-shadow: 0 10px 30px rgba(0,0,0,0.8); flex-shrink: 0; transform-origin: center center; }
  body.page-mode { position: fixed; top: 0; left: 0; width: 100vw; height: 100%; overflow: hidden; }
  #presentation-container { position: absolute; top: 0; left: 0; right: 0; bottom: 60px; display: flex; justify-content: center; align-items: center; overflow: hidden; }
  .slide-wrapper { position: absolute; display: none; justify-content: center; align-items: center; width: 100%; height: 100%; }
  .slide-wrapper.active { display: flex; }
  #bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(10px); padding: 0 15px; }
  .nav-center { display: flex; justify-content: center; align-items: center; gap: 6px; flex: 1; }
  .btn { padding: 8px 14px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.3); border-radius: 5px; cursor: pointer; font-size: 14px; white-space: nowrap; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
  .btn:hover { background: rgba(255,255,255,0.3); }
  #pdf-btn { position: absolute; left: 15px; background: rgba(41, 128, 185, 0.7); font-weight: bold; border-color: rgba(255,255,255,0.3); text-decoration: none; }
  #pdf-btn:hover { background: rgba(41, 128, 185, 1); }
  #fs-btn { position: absolute; right: 15px; background: rgba(255,255,255,0.15); font-weight: bold; border-color: rgba(255,255,255,0.5); }
  #page-indicator { color: #fff; font-size: 15px; font-weight: bold; margin: 0 10px; display: flex; align-items: center; white-space: nowrap; }
  #page-input { width: 45px; padding: 5px; margin-right: 6px; text-align: center; font-size: 15px; font-weight: bold; color: #fff; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); border-radius: 4px; outline: none; }
  #page-input::-webkit-outer-spin-button, #page-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  @media (max-width: 768px) {
    #presentation-container { bottom: 75px; }
    #bottom-nav { height: 75px; padding: 0 6px; }
    .nav-center { gap: 3px; }
    .btn { padding: 12px 6px; font-size: 12px; }
    #fs-btn { display: none !important; }
    #pdf-btn { position: static; margin-right: auto; }
    #page-indicator { margin: 0 2px; font-size: 13px; }
    #page-input { width: 35px; padding: 6px 0; font-size: 13px; margin-right: 2px; }
  }

<script>
  const totalSlides = 58;
  let currentSlide = 1;
  const isPageMode = document.body.classList.contains('page-mode');
  const isMobileOS = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  if (isMobileOS) {
    const fsBtn = document.getElementById('fs-btn');
    if (fsBtn) fsBtn.style.display = 'none';
  }
  function toggleFullScreen() {
    const doc = window.document;
    const docEl = doc.documentElement;
    const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
    const cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;
    if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
      if(requestFullScreen) requestFullScreen.call(docEl);
      document.getElementById('fs-btn').innerText = '축소';
    } else {
      if(cancelFullScreen) cancelFullScreen.call(doc);
      document.getElementById('fs-btn').innerText = '전체화면';
    }
  }
  function resizeSlides() {
    const container = document.getElementById('presentation-container');
    const containerW = container.clientWidth;
    const containerH = container.clientHeight;
    const slideW = 960 * 1.33333;
    const slideH = 540 * 1.33333;
    let scale = 1;
    if (isPageMode) {
      scale = Math.min((containerW - 20) / slideW, (containerH - 20) / slideH);
      document.querySelectorAll('.slide').forEach(s => { s.style.transform = `scale(${scale})`; });
    } else {
      scale = Math.min((window.innerWidth - 30) / slideW, 1);
      document.querySelectorAll('.slide').forEach(s => {
        s.style.transform = `scale(${scale})`;
        s.parentElement.style.height = (slideH * scale) + 'px';
      });
    }
  }
  window.addEventListener('resize', resizeSlides);
  window.addEventListener('orientationchange', () => setTimeout(resizeSlides, 200));
  function showSlide(index) {
    if (index < 1) index = 1;
    if (index > totalSlides) index = totalSlides;
    currentSlide = index;
    document.querySelectorAll('.slide-wrapper').forEach((w, i) => {
      if (i + 1 === currentSlide) w.classList.add('active');
      else w.classList.remove('active');
    });
    document.getElementById('page-input').value = currentSlide;
    resizeSlides();
  }
  function firstSlide() { showSlide(1); }
  function nextSlide() { showSlide(currentSlide + 1); }
  function prevSlide() { showSlide(currentSlide - 1); }
  function lastSlide() { showSlide(totalSlides); }
  document.getElementById('page-input').addEventListener('change', function() {
    let val = parseInt(this.value);
    if(isNaN(val)) val = currentSlide;
    showSlide(val);
  });
  document.addEventListener('keydown', function(e) {
    if (!isPageMode || e.target.tagName.toLowerCase() === 'input') return;
    switch(e.key) {
      case 'ArrowRight':
      case 'ArrowDown':
      case 'PageDown':
        e.preventDefault(); nextSlide(); break;
      case 'ArrowLeft':
      case 'ArrowUp':
      case 'PageUp':
        e.preventDefault(); prevSlide(); break;
      case 'Home':
        e.preventDefault(); firstSlide(); break;
      case 'End':
        e.preventDefault(); lastSlide(); break;
    }
  });
  let isScrolling = false;
  window.addEventListener('wheel', function(e) {
    if (isPageMode && !isScrolling) {
      if (e.deltaY > 0) {
        nextSlide();
        isScrolling = true;
        setTimeout(() => { isScrolling = false; }, 500);
      } else if (e.deltaY < 0) {
        prevSlide();
        isScrolling = true;
        setTimeout(() => { isScrolling = false; }, 500);
      }
    }
  }, { passive: true });
  let touchstartX = 0; let touchstartY = 0;
  document.addEventListener('touchstart', e => {
    touchstartX = e.changedTouches[0].screenX;
    touchstartY = e.changedTouches[0].screenY;
  }, {passive: true});
  document.addEventListener('touchend', e => {
    let touchendX = e.changedTouches[0].screenX;
    let touchendY = e.changedTouches[0].screenY;
    let diffX = touchstartX - touchendX;
    let diffY = Math.abs(touchstartY - touchendY);
    if (Math.abs(diffX) > 50 && diffY < 100) {
      if (diffX > 0) nextSlide();
      else prevSlide();
    }
  });
  document.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', function(e) {
      const href = this.getAttribute('href');
      if (href && href.startsWith('#slide_')) {
        e.preventDefault();
        const targetSlide = parseInt(href.replace('#slide_', ''));
        showSlide(targetSlide);
      }
    });
  });
  showSlide(1);
</script>
